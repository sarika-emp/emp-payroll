# =============================================================================
# EmpCloud Nginx Reverse Proxy
# Routes traffic by domain/path to the correct app
# =============================================================================

# ── Shared settings ──────────────────────────────────────────────────────────
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# ── Gzip ─────────────────────────────────────────────────────────────────────
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
gzip_min_length 1000;

# ── App 1: EMP Payroll ───────────────────────────────────────────────────────
# payroll.yourdomain.com → payroll client + API
server {
    listen 80;
    server_name payroll.yourdomain.com;

    # API requests → payroll server
    location /api/ {
        proxy_pass http://payroll-server:4000;
    }

    location /uploads/ {
        proxy_pass http://payroll-server:4000;
    }

    location /health {
        proxy_pass http://payroll-server:4000;
    }

    # Everything else → payroll client (React SPA)
    location / {
        proxy_pass http://payroll-client:80;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://payroll-client:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── App 2: EMP Billing ──────────────────────────────────────────────────────
# billing.yourdomain.com → billing app (single container serves both API + UI)
server {
    listen 80;
    server_name billing.yourdomain.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://billing-app:4001;
    }
}

# ── App 3: EMP LMS ──────────────────────────────────────────────────────────
# lms.yourdomain.com → LMS web (Next.js) + API
server {
    listen 80;
    server_name lms.yourdomain.com;

    client_max_body_size 50M;

    # API requests → LMS NestJS API
    location /lms/api/ {
        rewrite ^/lms/api/(.*) /$1 break;
        proxy_pass http://lms-api:4002;
    }

    # Swagger docs
    location /api/docs {
        proxy_pass http://lms-api:4002;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://lms-web:3000;
    }

    # Next.js static files
    location /_next/ {
        proxy_pass http://lms-web:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Jenkins (admin access) ──────────────────────────────────────────────────
# jenkins.yourdomain.com → Jenkins UI
server {
    listen 80;
    server_name jenkins.yourdomain.com;

    location / {
        proxy_pass http://jenkins:8080;
    }
}

# ── Default: reject unknown domains ─────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
