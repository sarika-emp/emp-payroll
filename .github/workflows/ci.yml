name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (shared)
        run: pnpm --filter @emp-payroll/shared exec tsc --noEmit

      - name: Type check (server)
        run: pnpm --filter @emp-payroll/server exec tsc --noEmit

      - name: Type check (client)
        run: pnpm --filter @emp-payroll/client exec tsc --noEmit

      - name: Run server unit tests
        run: pnpm --filter @emp-payroll/server test

      - name: Build client
        run: pnpm --filter @emp-payroll/client build

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.prod.yml build --no-cache
          echo "Docker images built successfully"
